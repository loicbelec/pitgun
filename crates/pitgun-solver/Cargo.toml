[package]
name = "pitgun-solver"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
pitgun-core = { path = "../pitgun-core" }
pitgun-contract = { path = "../pitgun-contract" }
pitgun-engine-f1 = { path = "../pitgun-engine-f1" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
wasm-bindgen = "0.2"
rand = "0.8" # Pour le Monte Carlo
