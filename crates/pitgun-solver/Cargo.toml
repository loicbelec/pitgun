[package]
name = "pitgun-solver"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
pitgun-simulator = { path = "../pitgun-simulator", features = ["wasm"] }
pitgun-contract = { path = "../pitgun-contract" }
pitgun-policy = { path = "../pitgun-policy" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
wasm-bindgen = "0.2"
rand = "0.8"
getrandom = { version = "0.2", features = ["js"] }
