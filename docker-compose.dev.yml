services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-pitgun}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-pitgun-local}"
      POSTGRES_DB: "${POSTGRES_DB:-pitgun}"
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pitgun} -d ${POSTGRES_DB:-pitgun}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  pitgun-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BIN_NAME: pitgun-gateway
    environment:
      PITGUN_GATEWAY_BIND: "0.0.0.0:8080"
      PITGUN_GATEWAY_ALLOW_NON_LOOPBACK: "1"
      PITGUN_GATEWAY_DATABASE_URL: "postgresql://${POSTGRES_USER:-pitgun}:${POSTGRES_PASSWORD:-pitgun-local}@postgres:5432/${POSTGRES_DB:-pitgun}"
      PITGUN_GATEWAY_API_KEYS: "${PITGUN_GATEWAY_API_KEYS:-pitgun-local-dev}"
      RUST_LOG: "${PITGUN_GATEWAY_RUST_LOG:-info}"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${PITGUN_GATEWAY_PORT:-8080}:8080"
    restart: unless-stopped

  pitgun-authority:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BIN_NAME: pitgun-authority
    environment:
      PITGUN_AUTHORITY_BIND: "0.0.0.0:8081"
      PITGUN_SIGNING_SECRET: "${PITGUN_SIGNING_SECRET:-pitgun-local-signing-secret}"
      RUST_LOG: "${PITGUN_AUTHORITY_RUST_LOG:-info}"
    ports:
      - "127.0.0.1:${PITGUN_AUTHORITY_PORT:-8081}:8081"
    restart: unless-stopped
