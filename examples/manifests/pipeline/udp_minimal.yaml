# yaml-language-server: $schema=https://pitgun.io/schemas/pipeline-manifest/v1

manifest_version: 1

source:
  type: udp
  bind_addr: "0.0.0.0"
  port: 5000

processors:
  - type: channel_filter
    channels: ["nEngine", "throttle"]

  - type: scale
    channel: "nEngine"
    factor: 2.0

  - type: stats

sink:
  type: console