# yaml-language-server: $schema=https://schemas.pitgun.io/bolt-manifest/v1.json
manifest_version: 1

bolt:
  id: engine_stress_index
  description: "Compute a normalized engine stress index from engine speed and throttle."
  ast: "engine_stress_index.ast.json"

  inputs:
    - nEngine
    - Throttle

  output: engine_stress_index

  params:
    rpm_min: 8000
    rpm_max: 18000

  tags:
    - motorsport
    - power_unit
    - stress
    - safety
