# yaml-language-server: $schema=https://pitgun.io/schemas/bolt-manifest/v1

manifest_version: 1

bolt:
  id: engine_stress_index
  description: "Normalized engine stress based on RPM and throttle"
  ast: "engine_stress_index.ast.json"
  inputs:
    - engine_speed
    - throttle
  output: engine_stress_index
  params:
    rpm_min: 8000
    rpm_max: 18000
  tags:
    - f1
    - power_unit
    - safety