# IoT Sensors Parameter Registry
# Parameter definitions for industrial IoT and environmental monitoring
# Suitable for building automation, manufacturing, and smart infrastructure

version: "1.0"
name: "IoT Sensors Registry"
description: "Industrial IoT and environmental sensor parameters"

# Sensor categories
groups:
  - id: environmental
    name: "Environmental"
    description: "Temperature, humidity, pressure, air quality"
  - id: electrical
    name: "Electrical"
    description: "Voltage, current, power, energy"
  - id: mechanical
    name: "Mechanical"
    description: "Vibration, position, flow, level"
  - id: safety
    name: "Safety"
    description: "Smoke, gas, motion, access"
  - id: connectivity
    name: "Connectivity"
    description: "Signal strength, battery, status"

parameters:
  # ============================================
  # ENVIRONMENTAL (1-99)
  # ============================================
  - id: 1
    name: temperature_ambient
    description: "Ambient air temperature"
    unit: "°C"
    data_type: F32
    range: { min: -40, max: 85 }
    conversion:
      type: linear
      scale: 0.01
      offset: -40
    access_level: public
    group: environmental
    sample_rate_hz: 1
    mqtt_topic: "sensors/+/temperature"

  - id: 2
    name: humidity_relative
    description: "Relative humidity"
    unit: "%RH"
    data_type: F32
    range: { min: 0, max: 100 }
    conversion:
      type: linear
      scale: 0.1
      offset: 0
    access_level: public
    group: environmental
    sample_rate_hz: 1
    mqtt_topic: "sensors/+/humidity"

  - id: 3
    name: pressure_barometric
    description: "Barometric pressure"
    unit: hPa
    data_type: F32
    range: { min: 800, max: 1200 }
    conversion:
      type: linear
      scale: 0.1
      offset: 0
    access_level: public
    group: environmental
    sample_rate_hz: 0.1
    mqtt_topic: "sensors/+/pressure"

  - id: 4
    name: co2_concentration
    description: "Carbon dioxide concentration"
    unit: ppm
    data_type: U16
    range: { min: 0, max: 10000 }
    conversion: { type: none }
    access_level: public
    group: environmental
    sample_rate_hz: 0.2
    mqtt_topic: "sensors/+/co2"

  - id: 5
    name: pm25_concentration
    description: "PM2.5 particulate matter"
    unit: "µg/m³"
    data_type: F32
    range: { min: 0, max: 500 }
    conversion: { type: none }
    access_level: public
    group: environmental
    sample_rate_hz: 0.1
    mqtt_topic: "sensors/+/pm25"

  - id: 6
    name: pm10_concentration
    description: "PM10 particulate matter"
    unit: "µg/m³"
    data_type: F32
    range: { min: 0, max: 1000 }
    conversion: { type: none }
    access_level: public
    group: environmental
    sample_rate_hz: 0.1
    mqtt_topic: "sensors/+/pm10"

  - id: 7
    name: voc_index
    description: "Volatile organic compounds index"
    unit: ""
    data_type: U16
    range: { min: 1, max: 500 }
    conversion: { type: none }
    access_level: public
    group: environmental
    sample_rate_hz: 0.1

  - id: 8
    name: light_intensity
    description: "Ambient light intensity"
    unit: lux
    data_type: F32
    range: { min: 0, max: 100000 }
    conversion:
      type: polynomial
      coefficients: [0, 0.1, 0.001]
    access_level: public
    group: environmental
    sample_rate_hz: 1

  - id: 9
    name: uv_index
    description: "UV radiation index"
    unit: ""
    data_type: F32
    range: { min: 0, max: 15 }
    conversion: { type: none }
    access_level: public
    group: environmental
    sample_rate_hz: 0.1

  - id: 10
    name: noise_level
    description: "Sound pressure level"
    unit: dB
    data_type: F32
    range: { min: 20, max: 140 }
    conversion: { type: none }
    access_level: public
    group: environmental
    sample_rate_hz: 1

  # ============================================
  # ELECTRICAL (100-199)
  # ============================================
  - id: 100
    name: voltage_ac_l1
    description: "AC voltage phase L1"
    unit: V
    data_type: F32
    range: { min: 0, max: 500 }
    conversion: { type: none }
    access_level: protected
    group: electrical
    sample_rate_hz: 10

  - id: 101
    name: voltage_ac_l2
    description: "AC voltage phase L2"
    unit: V
    data_type: F32
    range: { min: 0, max: 500 }
    conversion: { type: none }
    access_level: protected
    group: electrical
    sample_rate_hz: 10

  - id: 102
    name: voltage_ac_l3
    description: "AC voltage phase L3"
    unit: V
    data_type: F32
    range: { min: 0, max: 500 }
    conversion: { type: none }
    access_level: protected
    group: electrical
    sample_rate_hz: 10

  - id: 110
    name: current_ac_l1
    description: "AC current phase L1"
    unit: A
    data_type: F32
    range: { min: 0, max: 1000 }
    conversion: { type: none }
    access_level: protected
    group: electrical
    sample_rate_hz: 10

  - id: 111
    name: current_ac_l2
    description: "AC current phase L2"
    unit: A
    data_type: F32
    range: { min: 0, max: 1000 }
    conversion: { type: none }
    access_level: protected
    group: electrical
    sample_rate_hz: 10

  - id: 112
    name: current_ac_l3
    description: "AC current phase L3"
    unit: A
    data_type: F32
    range: { min: 0, max: 1000 }
    conversion: { type: none }
    access_level: protected
    group: electrical
    sample_rate_hz: 10

  - id: 120
    name: power_active_total
    description: "Total active power"
    unit: kW
    data_type: F32
    range: { min: -1000, max: 1000 }
    conversion: { type: none }
    access_level: protected
    group: electrical
    sample_rate_hz: 10

  - id: 121
    name: power_reactive_total
    description: "Total reactive power"
    unit: kVAr
    data_type: F32
    range: { min: -1000, max: 1000 }
    conversion: { type: none }
    access_level: protected
    group: electrical
    sample_rate_hz: 10

  - id: 122
    name: power_factor
    description: "Power factor"
    unit: ""
    data_type: F32
    range: { min: -1, max: 1 }
    conversion: { type: none }
    access_level: protected
    group: electrical
    sample_rate_hz: 10

  - id: 130
    name: energy_consumed
    description: "Total energy consumed"
    unit: kWh
    data_type: F64
    range: { min: 0, max: 1000000000 }
    conversion: { type: none }
    access_level: protected
    group: electrical
    sample_rate_hz: 0.1

  - id: 131
    name: energy_exported
    description: "Total energy exported"
    unit: kWh
    data_type: F64
    range: { min: 0, max: 1000000000 }
    conversion: { type: none }
    access_level: protected
    group: electrical
    sample_rate_hz: 0.1

  - id: 140
    name: frequency
    description: "Grid frequency"
    unit: Hz
    data_type: F32
    range: { min: 45, max: 65 }
    conversion: { type: none }
    access_level: public
    group: electrical
    sample_rate_hz: 10

  # ============================================
  # MECHANICAL (200-299)
  # ============================================
  - id: 200
    name: vibration_x
    description: "Vibration X-axis acceleration"
    unit: g
    data_type: F32
    range: { min: -50, max: 50 }
    conversion: { type: none }
    access_level: protected
    group: mechanical
    sample_rate_hz: 100

  - id: 201
    name: vibration_y
    description: "Vibration Y-axis acceleration"
    unit: g
    data_type: F32
    range: { min: -50, max: 50 }
    conversion: { type: none }
    access_level: protected
    group: mechanical
    sample_rate_hz: 100

  - id: 202
    name: vibration_z
    description: "Vibration Z-axis acceleration"
    unit: g
    data_type: F32
    range: { min: -50, max: 50 }
    conversion: { type: none }
    access_level: protected
    group: mechanical
    sample_rate_hz: 100

  - id: 203
    name: vibration_rms
    description: "Vibration RMS velocity"
    unit: mm/s
    data_type: F32
    range: { min: 0, max: 100 }
    conversion: { type: none }
    access_level: protected
    group: mechanical
    sample_rate_hz: 10

  - id: 210
    name: flow_rate_liquid
    description: "Liquid flow rate"
    unit: L/min
    data_type: F32
    range: { min: 0, max: 10000 }
    conversion:
      type: table
      breakpoints: [0, 1000, 2000, 4000, 8000, 16000]
      values: [0, 10, 50, 200, 800, 3000]
    access_level: protected
    group: mechanical
    sample_rate_hz: 1

  - id: 211
    name: flow_rate_gas
    description: "Gas flow rate"
    unit: "m³/h"
    data_type: F32
    range: { min: 0, max: 10000 }
    conversion: { type: none }
    access_level: protected
    group: mechanical
    sample_rate_hz: 1

  - id: 220
    name: level_tank
    description: "Tank level"
    unit: "%"
    data_type: F32
    range: { min: 0, max: 100 }
    conversion: { type: none }
    access_level: protected
    group: mechanical
    sample_rate_hz: 0.1

  - id: 221
    name: level_ultrasonic
    description: "Ultrasonic distance measurement"
    unit: mm
    data_type: F32
    range: { min: 0, max: 10000 }
    conversion: { type: none }
    access_level: protected
    group: mechanical
    sample_rate_hz: 1

  - id: 230
    name: pressure_hydraulic
    description: "Hydraulic system pressure"
    unit: bar
    data_type: F32
    range: { min: 0, max: 500 }
    conversion: { type: none }
    access_level: protected
    group: mechanical
    sample_rate_hz: 10

  - id: 231
    name: pressure_pneumatic
    description: "Pneumatic system pressure"
    unit: bar
    data_type: F32
    range: { min: 0, max: 20 }
    conversion: { type: none }
    access_level: protected
    group: mechanical
    sample_rate_hz: 10

  - id: 240
    name: motor_speed
    description: "Motor rotational speed"
    unit: rpm
    data_type: F32
    range: { min: 0, max: 30000 }
    conversion: { type: none }
    access_level: protected
    group: mechanical
    sample_rate_hz: 10

  - id: 241
    name: motor_temperature
    description: "Motor winding temperature"
    unit: "°C"
    data_type: F32
    range: { min: -40, max: 200 }
    conversion: { type: none }
    access_level: protected
    group: mechanical
    sample_rate_hz: 1

  # ============================================
  # SAFETY (300-399)
  # ============================================
  - id: 300
    name: smoke_detector
    description: "Smoke detector status"
    unit: ""
    data_type: U8
    range: { min: 0, max: 255 }
    conversion: { type: none }
    access_level: public
    group: safety
    sample_rate_hz: 1
    alerts:
      - condition: "value > 50"
        severity: warning
        message: "Smoke detected"
      - condition: "value > 150"
        severity: critical
        message: "High smoke level"

  - id: 301
    name: gas_leak_detector
    description: "Gas leak detector (combustible gas %LEL)"
    unit: "%LEL"
    data_type: F32
    range: { min: 0, max: 100 }
    conversion: { type: none }
    access_level: public
    group: safety
    sample_rate_hz: 1
    alerts:
      - condition: "value > 10"
        severity: warning
        message: "Gas leak detected"
      - condition: "value > 25"
        severity: critical
        message: "Dangerous gas concentration"

  - id: 302
    name: motion_detected
    description: "PIR motion detection"
    unit: ""
    data_type: U8
    range: { min: 0, max: 1 }
    conversion: { type: none }
    access_level: protected
    group: safety
    sample_rate_hz: 10

  - id: 303
    name: door_contact
    description: "Door/window contact (0=closed, 1=open)"
    unit: ""
    data_type: U8
    range: { min: 0, max: 1 }
    conversion: { type: none }
    access_level: protected
    group: safety
    sample_rate_hz: 1

  - id: 304
    name: water_leak
    description: "Water leak detected"
    unit: ""
    data_type: U8
    range: { min: 0, max: 1 }
    conversion: { type: none }
    access_level: protected
    group: safety
    sample_rate_hz: 1

  - id: 310
    name: emergency_button
    description: "Emergency stop button pressed"
    unit: ""
    data_type: U8
    range: { min: 0, max: 1 }
    conversion: { type: none }
    access_level: public
    group: safety
    sample_rate_hz: 10

  - id: 311
    name: safety_light_curtain
    description: "Safety light curtain status"
    unit: ""
    data_type: U8
    range: { min: 0, max: 1 }
    conversion: { type: none }
    access_level: protected
    group: safety
    sample_rate_hz: 100

  # ============================================
  # CONNECTIVITY (400-499)
  # ============================================
  - id: 400
    name: rssi_wifi
    description: "WiFi signal strength"
    unit: dBm
    data_type: I8
    range: { min: -100, max: 0 }
    conversion: { type: none }
    access_level: public
    group: connectivity
    sample_rate_hz: 0.1

  - id: 401
    name: rssi_lora
    description: "LoRa signal strength"
    unit: dBm
    data_type: I8
    range: { min: -130, max: 0 }
    conversion: { type: none }
    access_level: public
    group: connectivity
    sample_rate_hz: 0.01

  - id: 402
    name: snr_lora
    description: "LoRa signal-to-noise ratio"
    unit: dB
    data_type: F32
    range: { min: -20, max: 20 }
    conversion: { type: none }
    access_level: public
    group: connectivity
    sample_rate_hz: 0.01

  - id: 410
    name: battery_voltage_sensor
    description: "Sensor battery voltage"
    unit: V
    data_type: F32
    range: { min: 0, max: 5 }
    conversion: { type: none }
    access_level: public
    group: connectivity
    sample_rate_hz: 0.01

  - id: 411
    name: battery_percentage
    description: "Sensor battery percentage"
    unit: "%"
    data_type: U8
    range: { min: 0, max: 100 }
    conversion: { type: none }
    access_level: public
    group: connectivity
    sample_rate_hz: 0.01

  - id: 420
    name: uptime_seconds
    description: "Sensor uptime"
    unit: s
    data_type: U32
    range: { min: 0, max: 4294967295 }
    conversion: { type: none }
    access_level: public
    group: connectivity
    sample_rate_hz: 0.01

  - id: 421
    name: message_counter
    description: "Transmitted message counter"
    unit: ""
    data_type: U32
    range: { min: 0, max: 4294967295 }
    conversion: { type: none }
    access_level: public
    group: connectivity
    sample_rate_hz: 0.01

  - id: 430
    name: device_status
    description: "Device health status bitfield"
    unit: ""
    data_type: U16
    range: { min: 0, max: 65535 }
    conversion: { type: none }
    access_level: protected
    group: connectivity
    sample_rate_hz: 0.1
    # Bit meanings:
    # 0: OK
    # 1: Low battery
    # 2: Sensor fault
    # 3: Communication error
    # 4: Configuration error
    # 5-15: Reserved
