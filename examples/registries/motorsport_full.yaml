# Motorsport Full Parameter Registry
# Comprehensive parameter definitions for professional motorsport telemetry
# Covers engine, chassis, aero, thermal, and driver inputs

version: "1.0"
name: "Motorsport Full Registry"
description: "Complete motorsport telemetry parameters for professional racing applications"

# Parameter groups for organization
groups:
  - id: powertrain
    name: "Powertrain"
    description: "Engine, gearbox, and drivetrain parameters"
  - id: chassis
    name: "Chassis"
    description: "Suspension, steering, and chassis dynamics"
  - id: aero
    name: "Aerodynamics"
    description: "Wings, DRS, and aero balance"
  - id: thermal
    name: "Thermal"
    description: "Temperature sensors throughout the car"
  - id: inputs
    name: "Driver Inputs"
    description: "Pedals, steering, and buttons"
  - id: tyres
    name: "Tyres"
    description: "Tyre temperatures, pressures, and wear"
  - id: fuel
    name: "Fuel System"
    description: "Fuel flow, level, and consumption"
  - id: electrical
    name: "Electrical"
    description: "ERS, battery, and electrical systems"
  - id: timing
    name: "Timing"
    description: "Lap times, sectors, and session info"

parameters:
  # ============================================
  # POWERTRAIN (1-99)
  # ============================================
  - id: 1
    name: engine_rpm
    description: "Engine rotational speed"
    unit: rpm
    data_type: U16
    range: { min: 0, max: 20000 }
    conversion: { type: linear, scale: 1.0, offset: 0.0 }
    access_level: public
    group: powertrain
    sample_rate_hz: 200

  - id: 2
    name: engine_torque
    description: "Engine output torque"
    unit: Nm
    data_type: F32
    range: { min: -500, max: 1000 }
    conversion: { type: none }
    access_level: protected
    group: powertrain
    sample_rate_hz: 100

  - id: 3
    name: engine_power
    description: "Engine output power"
    unit: kW
    data_type: F32
    range: { min: 0, max: 1000 }
    conversion: { type: none }
    access_level: protected
    group: powertrain
    sample_rate_hz: 100

  - id: 4
    name: gear_current
    description: "Current gear (0=N, -1=R)"
    unit: ""
    data_type: I8
    range: { min: -1, max: 8 }
    conversion: { type: none }
    access_level: public
    group: powertrain
    sample_rate_hz: 50

  - id: 5
    name: gear_ratio
    description: "Current gear ratio"
    unit: ""
    data_type: F32
    range: { min: 0.5, max: 5.0 }
    conversion: { type: none }
    access_level: private
    group: powertrain

  - id: 6
    name: clutch_position
    description: "Clutch paddle position"
    unit: "%"
    data_type: F32
    range: { min: 0, max: 100 }
    conversion: { type: none }
    access_level: public
    group: powertrain
    sample_rate_hz: 100

  - id: 7
    name: gearbox_oil_temp
    description: "Gearbox oil temperature"
    unit: "°C"
    data_type: F32
    range: { min: 0, max: 200 }
    conversion: { type: none }
    access_level: protected
    group: powertrain
    sample_rate_hz: 10

  - id: 8
    name: gearbox_oil_pressure
    description: "Gearbox oil pressure"
    unit: bar
    data_type: F32
    range: { min: 0, max: 20 }
    conversion: { type: none }
    access_level: protected
    group: powertrain
    sample_rate_hz: 10

  # ============================================
  # DRIVER INPUTS (100-199)
