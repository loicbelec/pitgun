# F1 Generic Parameter Registry
# Canonical parameter definitions for F1 telemetry
# Compatible with EA F1 game UDP format and real F1 data

version: "1.0"
name: "F1 Generic Registry"
description: "Standard F1 telemetry parameters for simulation and real-world data"

parameters:
  # ============================================
  # ENGINE / POWERTRAIN
  # ============================================
  - id: 1
    name: engine_speed
    canonical_name: engine_rpm
    description: "Engine rotational speed"
    unit: rpm
    data_type: U16
    range:
      min: 0
      max: 15000
    conversion:
      type: linear
      scale: 1.0
      offset: 0.0
    access_level: public
    group: powertrain
    tags: [engine, critical]
    sample_rate_hz: 100

  - id: 2
    name: engine_temperature
    canonical_name: engine_coolant_temp
    description: "Engine coolant temperature"
    unit: "°C"
    data_type: U8
    range:
      min: 0
      max: 150
    conversion:
      type: linear
      scale: 1.0
      offset: 0.0
    access_level: public
    group: thermal
    tags: [engine, temperature]
    sample_rate_hz: 10

  - id: 3
    name: fuel_remaining
    canonical_name: fuel_mass_kg
    description: "Remaining fuel in tank"
    unit: kg
    data_type: F32
    range:
      min: 0
      max: 110
    conversion:
      type: none
    access_level: public
    group: powertrain
    tags: [fuel, strategy]
    sample_rate_hz: 10

  - id: 4
    name: fuel_mix
    canonical_name: fuel_mode
    description: "Fuel mixture mode (0=Lean, 1=Standard, 2=Rich, 3=Max)"
    unit: ""
    data_type: U8
    range:
      min: 0
      max: 3
    conversion:
      type: none
    access_level: public
    group: powertrain
    tags: [fuel, mode]

  # ============================================
  # THROTTLE / BRAKE
  # ============================================
  - id: 10
    name: throttle
    canonical_name: throttle_pedal_ratio
