name: Deploy Public Schemas

on:
  push:
    branches: [main]
    paths:
      - "schemas/**"
      - ".github/workflows/deploy-schemas.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: schemas-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: schemas-production
      url: https://schemas.pitgun.io

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Validate schemas and examples
        run: |
          python -m pip install -r requirements-dev.txt
          python scripts/validate-schemas.py

      - name: Install SFTP client
        run: |
          sudo apt-get update
          sudo apt-get install --yes lftp

      - name: Pin OVH SSH host key
        run: |
          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' \
            'ftp.cluster005.hosting.ovh.net ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIEk5m6vt7XKr8ntcIa15U/402qpVsErwQJVTKZYlVj0s' \
            > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

      - name: Deploy schemas to OVH
        env:
          LFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_PATH: ${{ secrets.SFTP_PATH }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
        run: |
          set -euo pipefail
          lftp --env-password \
            --user "$SFTP_USER" \
            --port "${SFTP_PORT:-22}" \
            "sftp://$SFTP_HOST" <<LFTP
          set cmd:fail-exit true
          set net:max-retries 2
          set net:timeout 20
          set sftp:auto-confirm no
          set sftp:connect-program "ssh -a -x -o BatchMode=no -o StrictHostKeyChecking=yes -o UserKnownHostsFile=$HOME/.ssh/known_hosts"
          mirror --reverse --delete --verbose schemas/ "$SFTP_PATH"
          bye
          LFTP

      - name: Verify public catalog and canonical schema
        run: |
          curl --fail --silent --show-error --retry 5 --retry-all-errors \
            https://schemas.pitgun.io/index.json -o /tmp/pitgun-schema-index.json
          python -m json.tool /tmp/pitgun-schema-index.json >/dev/null
          curl --fail --silent --show-error --retry 5 --retry-all-errors \
            https://schemas.pitgun.io/pitgun-envelope/v1.json -o /tmp/pitgun-envelope-v1.json
          python - <<'PY'
          import json
          from pathlib import Path

          schema = json.loads(Path("/tmp/pitgun-envelope-v1.json").read_text())
          expected = "https://schemas.pitgun.io/pitgun-envelope/v1.json"
          if schema.get("$id") != expected:
              raise SystemExit(f"unexpected public schema id: {schema.get('$id')!r}")
          PY
