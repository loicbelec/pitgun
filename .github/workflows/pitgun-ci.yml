name: pitgun-ci

on:
  pull_request:
  push:
    branches:
      - main
      - dev

jobs:
  racing-e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            cmake \
            libcurl4-openssl-dev \
            libsasl2-dev \
            zlib1g-dev \
            libzstd-dev

      - name: Fetch locked dependencies
        run: cargo fetch --locked

      - name: Run hermetic Racing scenario-to-VERIFIED gate
        env:
          CARGO_NET_OFFLINE: "true"
        run: cargo test --locked -p pitgun-cli --test racing_demo --verbose

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            cmake \
            libcurl4-openssl-dev \
            libsasl2-dev \
            zlib1g-dev \
            libzstd-dev

      - name: Install Python dev dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Validate public schemas
        run: python scripts/validate-schemas.py

      - name: Build project
        run: cargo build --all --verbose

      - name: Run tests
        run: cargo test --all --verbose

      - name: Run supported observed-data example
        run: cargo run --locked -p pitgun-core --example observed_segment_aggregation

      - name: Format check
        run: cargo fmt -p pitgun-policy -p pitgun-racing-policy -p pitgun-gateway -p pitgun-authority -- --check

      - name: Clippy (lints)
        run: cargo clippy -p pitgun-policy -p pitgun-racing-policy -p pitgun-gateway -p pitgun-authority -- -D warnings

  wasm-golden-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust with WASM target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked --version 0.14.0

      - name: Verify deterministic contract primitives in Node/WASM
        run: wasm-pack test --node crates/pitgun-contract

      - name: Verify Racing contract compatibility in Node/WASM
        run: wasm-pack test --node crates/pitgun-racing-contract

      - name: Verify deterministic runtime RNG in Node/WASM
        run: wasm-pack test --node crates/pitgun-runtime

      - name: Verify Racing golden run in Node/WASM
        run: wasm-pack test --node crates/pitgun-solver
