name: pitgun-ci

on:
  pull_request:
  push:
    branches:
      - main
      - dev

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            cmake \
            libcurl4-openssl-dev \
            libsasl2-dev \
            zlib1g-dev \
            libzstd-dev

      - name: Build project
        run: cargo build --all --verbose

      - name: Run tests
        run: cargo test --all --verbose

      - name: Format check
        run: cargo fmt -p pitgun-gateway -p pitgun-authority -- --check

      - name: Clippy (lints)
        run: cargo clippy -p pitgun-gateway -p pitgun-authority -- -D warnings
